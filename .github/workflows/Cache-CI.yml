name: Cache with CI

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Cache node modules
              uses: actions/cache@v4
              with:
                path: ~/.npm
                key: ${{ runner.os }}-node-${{ hashFiles ('**/package-lock.json') }}
                restore-keys: |
                  ${{ runner.os }}-node-
            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: npm test