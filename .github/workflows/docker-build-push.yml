name: Build and Push Docker Image

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker login
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_TOKEN }}

            - name: Build docker image
              run: docker build -t ${{ secrets.DOCKER_USERNAME }}/github-actions-runner:latest .

            - name: Push docker image
              if: github.ref == 'refs/heads/main'
              run: docker push ${{ secrets.DOCKER_USERNAME }}/github-actions-runner:latest

            - name: Build docker image with SHA tag
              run: docker build -t ${{ secrets.DOCKER_USERNAME }}/github-actions-runner:${{ github.sha }} .

            - name: Push docker image with SHA tag
              if: github.ref == 'refs/heads/main'
              run: docker push ${{ secrets.DOCKER_USERNAME }}/github-actions-runner:${{ github.sha }}
