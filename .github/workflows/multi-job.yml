name: Multi job workflow

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Build step
              run: echo "Building the app"
              
    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Test step
              run: echo "Running tests"
    
    deploy:
        runs-on: ubuntu-latest
        needs: [build, test]
        steps:
            - name: Deploy step
              run: echo "Deploying"