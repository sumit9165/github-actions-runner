name: runner-info

on:
    workflow_dispatch:

jobs:
    ubuntu-job:
        runs-on: ubuntu-latest
        steps:
            - name: Ubuntu runner info
              run: |
                echo "Ubuntu runner info"
                hostname
                whoami
    windows-job:
        runs-on: windows-latest
        steps:
            - name: Windows runner info
              run: |
                echo "Windows runner info"
                hostname
                whoami
    macos-job:
        runs-on: macos-latest
        steps:
            - name: macOS runner info
              run: |
                echo "macOS runner info"
                hostname
                whoami