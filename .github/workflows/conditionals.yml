name: Conditionals 

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  conditional-job:
    # Run this job only for push events (not PRs)
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest

    steps:
      - name: Step that runs normally
        run: echo "Initial step running"

      - name: Step that runs only on main branch
        if: ${{ github.ref == 'refs/heads/main' }}
        run: echo "This runs only on the main branch"

      - name: Step that intentionally fails
        id: fail_step
        run: exit 1
        continue-on-error: true

      - name: Step that runs only if previous step failed
        if: ${{ failure() }}
        run: echo "A previous step failed"
