name: Artifacts between jobs

on:
    workflow_dispatch:

jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: create artifact file
              run: |
                mkdir -p output
                echo "This is an artifact file created in job1" > output/artifact.txt
                echo "Artifact created at: $(date)" >> output/artifact.txt

            - name: upload artifacts
              uses: actions/upload-artifact@v4
              with:
                name: my-artifact
                path: output/artifact.txt


    job2:
        runs-on: ubuntu-latest
        needs: job1
        steps:
            - name: download artifact
              uses: actions/download-artifact@v4
              with:
                name: my-artifact
            - name: display artifact content
              run: |
                echo "Content of the downloaded artifact:"
                cat my-artifact/artifact.txt